global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "site", "severity"]
  group_wait: 1m
  group_interval: 10m
  repeat_interval: 2h
  receiver: feishu-adapter

receivers:
  - name: feishu-adapter
    webhook_configs:
      - url: http://feishu-alert-adapter:9098/alertmanager/feishu
        send_resolved: false
        http_config:
          authorization:
            type: Bearer
            credentials: "__REPLACE_WITH_ALERTMANAGER_FEISHU_ADAPTER_BEARER_TOKEN__"
