groups:
  - name: newapi-system
    rules:
      - alert: NewAPIHighGCPauseP99
        expr: histogram_quantile(0.99, sum by (site, le) (rate(go_gc_duration_seconds_bucket[5m]))) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "new-api site {{ $labels.site }} GC P99 pause too high"
          description: "Site {{ $labels.site }} GC 99th percentile pause is above 200ms for 5 minutes."

      - alert: NewAPIChannelAvgTotalDurationTooHigh
        expr: (sum by (site, channel_id, channel_name, channel_type) (rate(newapi_channel_attempt_duration_seconds_sum{result="success"}[5m])) / clamp_min(sum by (site, channel_id, channel_name, channel_type) (rate(newapi_channel_attempt_duration_seconds_count{result="success"}[5m])), 0.000001)) > 40
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Site {{ $labels.site }} channel {{ $labels.channel_name }} average total duration too high"
          description: "Site {{ $labels.site }} channel {{ $labels.channel_name }} ({{ $labels.channel_id }}) average total duration over 5 minutes is above 40 seconds."

      - alert: NewAPIHTTPInflightTooHigh
        expr: max by (site) (max_over_time(newapi_http_inflight_requests{route_tag="relay"}[10m])) > 200
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "new-api site {{ $labels.site }} relay inflight requests too high"
          description: "Site {{ $labels.site }} relay inflight requests stayed above 200 within the last 10 minutes."

      - alert: NewAPISystemPerformanceRejected
        expr: sum by (site) (increase(newapi_system_performance_rejections_total[5m])) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "new-api site {{ $labels.site }} rejected traffic because of system pressure"
          description: "Site {{ $labels.site }} system protection rejected relay traffic during the last 5 minutes."

  - name: newapi-channel
    rules:
      - alert: NewAPIChannelAvgFirstResponseDurationTooHigh
        expr: (sum by (site, channel_id, channel_name, channel_type) (rate(newapi_channel_first_response_duration_seconds_sum[5m])) / clamp_min(sum by (site, channel_id, channel_name, channel_type) (rate(newapi_channel_first_response_duration_seconds_count[5m])), 0.000001)) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Site {{ $labels.site }} channel {{ $labels.channel_name }} average first response duration too high"
          description: "Site {{ $labels.site }} channel {{ $labels.channel_name }} ({{ $labels.channel_id }}) average first response duration over 5 minutes is above 10 seconds."

      - alert: NewAPIChannelHasErrors
        expr: sum by (site, channel_id, channel_name, channel_type) (increase(newapi_channel_errors_total[5m])) >= 3 and sum by (site, channel_id, channel_name, channel_type) (increase(newapi_channel_requests_total[5m])) >= 10
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Site {{ $labels.site }} channel {{ $labels.channel_name }} has errors"
          description: "Site {{ $labels.site }} channel {{ $labels.channel_name }} ({{ $labels.channel_id }}) produced at least 3 upstream errors within the last 5 minutes while handling at least 10 requests."

      - alert: NewAPIChannelSuccessRateTooLow
        expr: (sum by (site, channel_id, channel_name, channel_type) (increase(newapi_channel_requests_total{result="success"}[5m])) / clamp_min(sum by (site, channel_id, channel_name, channel_type) (increase(newapi_channel_requests_total[5m])), 1)) < 0.95 and sum by (site, channel_id, channel_name, channel_type) (increase(newapi_channel_requests_total[5m])) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Site {{ $labels.site }} channel {{ $labels.channel_name }} success rate too low"
          description: "Site {{ $labels.site }} channel {{ $labels.channel_name }} ({{ $labels.channel_id }}) success rate dropped below 95% over the last 5 minutes."
