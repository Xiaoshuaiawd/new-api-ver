groups:
  - name: newapi-system
    rules:
      - alert: NewAPIHighGCPauseP99
        expr: histogram_quantile(0.99, sum by (site, le) (rate(go_gc_duration_seconds_bucket[5m]))) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "new-api site {{ $labels.site }} GC P99 pause too high"
          description: "Site {{ $labels.site }} GC 99th percentile pause is above 200ms for 5 minutes."

      - alert: NewAPIRelayP99TooHigh
        expr: histogram_quantile(0.99, sum by (site, le) (rate(newapi_http_request_duration_seconds_bucket{route_tag="relay"}[5m]))) > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "new-api site {{ $labels.site }} relay P99 latency too high"
          description: "Site {{ $labels.site }} relay-side P99 request duration is above 10 seconds for 5 minutes."

      - alert: NewAPIHTTPInflightTooHigh
        expr: max by (site) (max_over_time(newapi_http_inflight_requests{route_tag="relay"}[10m])) > 200
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "new-api site {{ $labels.site }} relay inflight requests too high"
          description: "Site {{ $labels.site }} relay inflight requests stayed above 200 within the last 10 minutes."

      - alert: NewAPISystemPerformanceRejected
        expr: sum by (site) (increase(newapi_system_performance_rejections_total[5m])) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "new-api site {{ $labels.site }} rejected traffic because of system pressure"
          description: "Site {{ $labels.site }} system protection rejected relay traffic during the last 5 minutes."

  - name: newapi-channel
    rules:
      - alert: NewAPIChannelLatencyP95TooHigh
        expr: histogram_quantile(0.95, sum by (site, le, channel_id, channel_name, channel_type) (rate(newapi_channel_upstream_latency_seconds_bucket[5m]))) > 8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Site {{ $labels.site }} channel {{ $labels.channel_name }} latency too high"
          description: "Site {{ $labels.site }} channel {{ $labels.channel_name }} ({{ $labels.channel_id }}) upstream P95 latency is above 8 seconds."

      - alert: NewAPIChannelHasErrors
        expr: sum by (site, channel_id, channel_name, channel_type) (increase(newapi_channel_errors_total[1m])) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Site {{ $labels.site }} channel {{ $labels.channel_name }} has errors"
          description: "Site {{ $labels.site }} channel {{ $labels.channel_name }} ({{ $labels.channel_id }}) produced upstream errors during the last minute."

      - alert: NewAPIChannelSuccessRateTooLow
        expr: (sum by (site, channel_id, channel_name, channel_type) (increase(newapi_channel_requests_total{result="success"}[5m])) / clamp_min(sum by (site, channel_id, channel_name, channel_type) (increase(newapi_channel_requests_total[5m])), 1)) < 0.95 and sum by (site, channel_id, channel_name, channel_type) (increase(newapi_channel_requests_total[5m])) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Site {{ $labels.site }} channel {{ $labels.channel_name }} success rate too low"
          description: "Site {{ $labels.site }} channel {{ $labels.channel_name }} ({{ $labels.channel_id }}) success rate dropped below 95% over the last 5 minutes."
