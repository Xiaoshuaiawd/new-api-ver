services:
  prometheus:
    image: prom/prometheus:latest
    container_name: new-api-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:latest
    container_name: new-api-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: new-api-grafana
    ports:
      - "3001:3000"
    environment:
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: Asia/Shanghai
    volumes:
      - grafana-storage:/var/lib/grafana

volumes:
  grafana-storage:
