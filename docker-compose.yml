# New-API Docker Compose Configuration
# 
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3000
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and SQL_DSN line 15
#   2. Uncomment the mysql service and SQL_DSN line 16
#   3. Uncomment mysql in depends_on (line 28)
#   4. Uncomment mysql_data in volumes section (line 64)
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!

version: '3.4' # For compatibility with older Docker versions

services:
  new-api:
    #image: calciumion/new-api:latest
    build: .
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api # ⚠️ IMPORTANT: Change the password in production!
      - SKIP_TOKEN_MODEL_LIMITS_TEXT_MIGRATION=false # 磁盘不足导致 tokens.model_limits 迁移失败时可临时改为 true
      - LOG_SQL_DSN=postgresql://root:123456@postgres:5432/new-api # 常规 logs 表数据库
      - MES_SQL_DSN=postgresql://root:123456@postgres:5432/new-api # 聊天数据 chat_log_* 分表数据库
#      - SQL_DSN=root:123456@tcp(mysql:3306)/new-api  # Point to the mysql service, uncomment if using MySQL
#      - LOG_SQL_DSN=root:123456@tcp(mysql:3306)/new-api  # logs 表 MySQL DSN
#      - MES_SQL_DSN=root:123456@tcp(mysql:3306)/new-api  # chat_log_* 分表 MySQL DSN
      - REDIS_CONN_STRING=redis://:123456@redis:6379 # ⚠️ IMPORTANT: Change the password in production!
      - REDIS_POOL_SIZE=128 # Redis 连接池大小（高并发聊天日志建议 >= 64）
      - TZ=Asia/Shanghai
      - CHAT_LOG_ENABLED=true  # 是否启用聊天日志记录 (Whether to enable chat log recording)
      - CHAT_LOG_TIMEZONE=Asia/Shanghai # 聊天日志统一时区（固定上海时区）
      - CHAT_LOG_STREAM_KEY=chat_log_events # Redis Stream 主队列
      - CHAT_LOG_DLQ_KEY=chat_log_events_dlq # Redis Stream 死信队列
      - CHAT_LOG_CONSUMER_GROUP=chat_log_cg # Redis 消费者组
      - CHAT_LOG_CONSUMER_START_ID=0 # 新建消费组起始位点：0=消费历史，$=仅新消息
      - CHAT_LOG_MAX_RETRY=3 # 入库失败最大重试次数
      - CHAT_LOG_MAX_BATCH=10 # 每批消费条数（高吞吐建议 300~1000）
      - CHAT_LOG_CONSUMER_WORKERS=32 # Redis Stream 消费协程数
      - CHAT_LOG_LOCAL_WORKERS=4 # 本地降级队列消费协程数
      - CHAT_LOG_STREAM_MAX_LEN=20000000 # Redis 主队列最大长度（近似裁剪）
      - CHAT_LOG_DLQ_MAX_LEN=500000 # Redis 死信队列最大长度（近似裁剪）
      - CHAT_LOG_PAYLOAD_INLINE_MAX_BYTES=1000000 # 超过该大小可走对象存储引用
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 是否启用批量更新 (Whether to enable batch update)
      - NODE_NAME=new-api-node-1  # 节点名称，用于审计日志中标识节点身份；多节点/容器部署时建议设置 (Node name used in audit logs; recommended when running multiple instances or in containers)
#      - STREAMING_TIMEOUT=300  # 流模式无响应超时时间，单位秒，默认120秒，如果出现空补全可以尝试改为更大值 （Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions）
#      - SESSION_SECRET=random_string  # 多机部署时设置，必须修改这个随机字符串！！ （multi-node deployment, set this to a random string!!!!!!!）
      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics 的测量 ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 网站 ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami 脚本 URL，默认为官方地址 (Umami Script URL, defaults to official URL)

    depends_on:
      - redis
      - postgres
#      - mysql  # Uncomment if using MySQL
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "123456"]  # ⚠️ IMPORTANT: Change this password in production!
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456  # ⚠️ IMPORTANT: Change this password in production!
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
    ports:
      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

#  mysql:
#    image: mysql:8.2
#    container_name: mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: 123456  # ⚠️ IMPORTANT: Change this password in production!
#      MYSQL_DATABASE: new-api
#    volumes:
#      - mysql_data:/var/lib/mysql
#    networks:
#      - new-api-network
#    ports:
#      - "3306:3306"  # Uncomment if you need to access MySQL from outside Docker

volumes:
  pg_data:
#  mysql_data:

networks:
  new-api-network:
    driver: bridge
